# Configuration file for intercaat contact detection
# intercaat uses Voronoi tessellation to detect inter-chain contacts

[qvoronoi_path]
# Path to qhull binaries (for faster C-based Voronoi calculation)
# On Linux/Mac: typically /usr/bin/ or ~/miniconda3/envs/.../bin/
# qvoronoi_bin = /home/user/miniconda3/envs/int_iScore/bin/
qvoronoi_bin =

# Name of the qvoronoi executable
executable_name = qvoronoi Fi

# Set to 'yes' to keep debug files (temporary qhull input/output)
debug_qvoronoi = no

# Set to 'yes' to use scipy-based Python Voronoi (slower but no external dependencies)
# Set to 'no' to use qhull C implementation (faster, requires qhull installation)
# Default: yes (for compatibility), set to no for better performance if qhull is installed
run_python_version = yes
